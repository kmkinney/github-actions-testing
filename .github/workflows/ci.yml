name: CI

on:
  pull_request:
  workflow_dispatch:

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      skip_build: ${{ steps.check.outputs.skip_build }}
      skip_lint: ${{ steps.check.outputs.skip_lint }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none
      - uses: pnpm/action-setup@v5
      - run: pnpm i
      - id: check
        run: |
          # List of CI/CD tasks to check. Maps to output as 'skip_<task>'
          tasks=(
            build
            lint
          )

          check_task() {
            if pnpm turbo query affected --tasks "$1" --exit-code 2>/dev/null; then
              echo "skip_$1=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip_$1=false" >> "$GITHUB_OUTPUT"
            fi
          }

          for task in "${tasks[@]}"; do
            check_task "$task"
          done

  build:
    needs: gate
    if: needs.gate.outputs.skip_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - run: pnpm i
      - run: pnpm turbo run build

  lint:
    needs: gate
    if: needs.gate.outputs.skip_lint != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - run: pnpm i
      - run: pnpm turbo run lint
