name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
      lint: ${{ steps.check.outputs.lint }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - id: check
        run: |
          echo "build=skip" >> "$GITHUB_OUTPUT"
          echo "lint=run" >> "$GITHUB_OUTPUT"

  build:
    needs: gate
    if: needs.gate.outputs.build == 'run'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - run: pnpm i
      - run: pnpm turbo run build

  lint:
    needs: gate
    if: needs.gate.outputs.lint == 'run'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - run: pnpm i
      - run: pnpm turbo run lint
